name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read
  security-events: write

env:
  TRIVY_VERSION: "0.61.0"

jobs:
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Trivy
        run: |
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | sudo tar -xzf - -C /usr/local/bin trivy
          trivy --version

      - name: Scan repository
        run: |
          trivy fs \
            --severity CRITICAL,HIGH \
            --format sarif \
            --output trivy-results.sarif \
            --exit-code 0 \
            .

      - name: Upload Trivy SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  trivy-docker:
    name: Trivy Docker image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -t enthropic:scan .

      - name: Install Trivy
        run: |
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | sudo tar -xzf - -C /usr/local/bin trivy
          trivy --version

      - name: Scan Docker image
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --format sarif \
            --output trivy-docker.sarif \
            --exit-code 0 \
            enthropic:scan

      - name: Upload Docker scan SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-docker.sarif
          category: trivy-docker

